<div id="app"></div>

<script>
// ============================================================
//  Cabina di Regia AI — Airgama
//  Prototipo cliccabile ad alta fedeltà · dati sintetici
// ============================================================

const App = {
  state: {
    screen: 'cabina',
    pick: {},
    pickOpen: null,
    alarmFilter: 'tutti',
    openAlarm: null,
    openPanel: 'commerciale',
    flowOpen: 'gestionale',
    bi: {
      rows: ['famiglia'],
      cols: [],
      measures: ['fatturato', 'marginePct'],
      filters: {},
      openFilter: null,
      view: 'tabella',
      reports: false,
    },
    toastMsg: '',
    toastShow: false,
    _toastTimer: null,
  },

  // ---- handler registry (event delegation) ----
  handlers: {},
  reg(fn) {
    const id = 'h' + (this._n = (this._n || 0) + 1);
    this.handlers[id] = fn;
    return id;
  },

  set(patch) {
    Object.assign(this.state, typeof patch === 'function' ? patch(this.state) : patch);
    this.render();
  },

  go(s) {
    this.set({ screen: s });
    try { window.scrollTo(0, 0); } catch (e) {}
  },

  toast(msg) {
    clearTimeout(this.state._toastTimer);
    this.state._toastTimer = setTimeout(() => this.set({ toastShow: false }), 3400);
    this.set({ toastMsg: msg, toastShow: true });
  },

  // picking: confirm full quantity (actual === requested)
  acceptFull(code) {
    const it = PICK_RAW.find(x => x.code === code);
    this.set(s => {
      const pick = { ...s.pick };
      if (pick[code] && pick[code].actual === it.qty) delete pick[code];
      else pick[code] = { actual: it.qty };
      return { pick, pickOpen: null };
    });
  },
  // open/close the "parziale" stepper for a line
  togglePartial(code) {
    this.set(s => {
      const open = s.pickOpen === code ? null : code;
      const pick = { ...s.pick };
      const it = PICK_RAW.find(x => x.code === code);
      // when opening, seed a partial value if not set yet (one less than requested)
      if (open && !pick[code]) pick[code] = { actual: Math.max(0, it.qty - 1) };
      return { pickOpen: open, pick };
    });
  },
  // step the actual picked quantity for a partial line
  setActual(code, delta) {
    const it = PICK_RAW.find(x => x.code === code);
    this.set(s => {
      const pick = { ...s.pick };
      const cur = pick[code] ? pick[code].actual : 0;
      const next = Math.max(0, Math.min(it.qty, cur + delta));
      pick[code] = { actual: next };
      return { pick };
    });
  },

  togglePanel(p) { this.set(s => ({ openPanel: s.openPanel === p ? null : p })); },
  toggleFlow(f) { this.set(s => ({ flowOpen: s.flowOpen === f ? null : f })); },

  setAlarmFilter(f) { this.set({ alarmFilter: f }); },
  toggleAlarm(id) { this.set(s => ({ openAlarm: s.openAlarm === id ? null : id })); },

  biSet(patch) { this.set(s => ({ bi: { ...s.bi, ...patch } })); },
  // place a field (measure or dimension level) on an axis: 'rows' | 'cols' | 'measures' | 'filters'
  biDrop(field, axis) {
    this.set(s => {
      const f = BI_FIELDS[field];
      const bi = { ...s.bi, rows: [...s.bi.rows], cols: [...s.bi.cols], measures: [...s.bi.measures], filters: { ...s.bi.filters } };
      if (f.type === 'measure') {
        bi.measures = bi.measures.filter(x => x !== field);
        bi.measures.push(field);
        return { bi };
      }
      // dimension level: lives in exactly one of rows/cols/filters
      bi.rows = bi.rows.filter(x => x !== field);
      bi.cols = bi.cols.filter(x => x !== field);
      delete bi.filters[field];
      if (axis === 'cols') bi.cols.push(field);
      else if (axis === 'filters') bi.filters[field] = null;
      else bi.rows.push(field);
      return { bi };
    });
  },
  biRemove(field) {
    this.set(s => {
      const bi = { ...s.bi, rows: s.bi.rows.filter(x => x !== field), cols: s.bi.cols.filter(x => x !== field), measures: s.bi.measures.filter(x => x !== field), filters: { ...s.bi.filters } };
      delete bi.filters[field];
      if (s.bi.openFilter === field) bi.openFilter = null;
      return { bi };
    });
  },
  biMove(field) { // swap a dim level between rows and cols
    this.set(s => {
      const bi = { ...s.bi, rows: [...s.bi.rows], cols: [...s.bi.cols] };
      if (bi.rows.includes(field)) { bi.rows = bi.rows.filter(x => x !== field); bi.cols.push(field); }
      else if (bi.cols.includes(field)) { bi.cols = bi.cols.filter(x => x !== field); bi.rows.push(field); }
      return { bi };
    });
  },
  biSwapAxes() { this.set(s => ({ bi: { ...s.bi, rows: s.bi.cols, cols: s.bi.rows } })); },
  biClear() { this.set({ bi: { rows: [], cols: [], measures: ['fatturato'], filters: {}, openFilter: null, view: 'tabella' } }); },
  biView(v) { this.set(s => ({ bi: { ...s.bi, view: v } })); },
  biToggleReports() { this.set(s => ({ bi: { ...s.bi, reports: !s.bi.reports } })); },
  biOpenFilter(level) { this.set(s => ({ bi: { ...s.bi, openFilter: s.bi.openFilter === level ? null : level } })); },
  biToggleMember(level, value) {
    this.set(s => {
      const all = olapDistinct(FACTS, level);
      const cur = s.bi.filters[level];
      let sel = (cur == null) ? [...all] : [...cur];
      sel = sel.includes(value) ? sel.filter(v => v !== value) : [...sel, value];
      return { bi: { ...s.bi, filters: { ...s.bi.filters, [level]: sel } } };
    });
  },
  biPreset(p) { this.set(s => ({ bi: { ...s.bi, ...p } })); },
};

function _rng(seed) { let s = seed % 2147483647; if (s <= 0) s += 2147483646; return () => (s = s * 16807 % 2147483647) / 2147483647; }

const FACTS = (function () {
  const rnd = _rng(20260620);
  const raw = [];
  OLAP_CLI.forEach(c => OLAP_FAM.forEach(f => OLAP_MESI.forEach(m => {
    const noise = 0.7 + rnd() * 0.6;
    raw.push({ cliente: c.name, area: c.area, regione: c.regione, famiglia: f.name, mese: m.name, _w: c.w * f.w * m.f * noise, margin: f.margin + c.mod, price: f.price });
  })));
  const tot = raw.reduce((a, r) => a + r._w, 0);
  const scale = 4500000 / tot;
  const facts = raw.map(r => {
    const fatturato = r._w * scale;
    return { cliente: r.cliente, area: r.area, regione: r.regione, famiglia: r.famiglia, mese: r.mese,
             trimestre: ['Gen', 'Feb', 'Mar'].includes(r.mese) ? 'T1' : 'T2',
             fatturato, margine: fatturato * (r.margin / 100), qta: Math.round(fatturato / r.price), scaduto: 0 };
  });
  OLAP_CLI.forEach(c => {
    if (!c.scad) return;
    const recs = facts.filter(r => r.cliente === c.name && r.mese === 'Giu').sort((a, b) => b.fatturato - a.fatturato);
    if (recs[0]) recs[0].scaduto = c.scad * 1000;
  });
  return facts;
})();

function olapAgg(records, mKey) {
  const M = MEASURES[mKey];
  if (M.kind === 'pct') { let n = 0, d = 0; records.forEach(r => { n += r[M.num]; d += r[M.den]; }); return d ? (n / d * 100) : 0; }
  let s = 0; records.forEach(r => s += r[M.field]); return s;
}
function olapFmt(v, mKey) {
  const M = MEASURES[mKey];
  if (M.kind === 'pct') return v.toFixed(1).replace('.', ',') + '%';
  if (M.kind === 'num') return Math.round(v).toLocaleString('it-IT');
  if (Math.abs(v) >= 1e6) return '€ ' + (v / 1e6).toFixed(2).replace('.', ',') + 'M';
  if (Math.abs(v) >= 1e3) return '€ ' + Math.round(v / 1e3).toLocaleString('it-IT') + 'k';
  return '€ ' + Math.round(v).toLocaleString('it-IT');
}
function olapDistinct(records, dim) {
  if (dim === 'mese') return OLAP_MESI.map(m => m.name).filter(v => records.some(r => r.mese === v));
  if (dim === 'area') return ['Italia', 'Export'].filter(v => records.some(r => r.area === v));
  return [...new Set(records.map(r => r[dim]))];
}
function olapBarColor(mKey, v) {
  if (mKey === 'marginePct') return v >= 30 ? '#2e9e5f' : (v >= 22 ? '#dfa000' : '#d23b2c');
  if (mKey === 'scaduto') return '#d23b2c';
  return '#1b4a93';
}

// ---------- PICKING ----------
function pickingScreen() {
  const pk = App.state.pick;
  const openCode = App.state.pickOpen;
  const total = PICK_RAW.length;
  const entries = PICK_RAW.filter(it => pk[it.code]);
  const addressed = entries.length;
  const done = addressed;
  const fullCount = PICK_RAW.filter(it => pk[it.code] && pk[it.code].actual === it.qty).length;
  const shortCount = PICK_RAW.filter(it => pk[it.code] && pk[it.code].actual < it.qty).length;
  const reqUnits = PICK_RAW.reduce((a, it) => a + it.qty, 0);
  const pickedUnits = PICK_RAW.reduce((a, it) => a + (pk[it.code] ? pk[it.code].actual : 0), 0);
  const pct = Math.round((addressed / total) * 100);
  const fullyPicked = fullCount === total;
  const allAddressed = addressed === total;
  const partial = allAddressed && shortCount > 0;

  const itemsHtml = PICK_RAW.map(it => {
    const e = pk[it.code];
    const actual = e ? e.actual : null;
    const full = e && actual === it.qty;
    const part = e && actual > 0 && actual < it.qty;
    const zero = e && actual === 0;
    const isOpen = openCode === it.code;
    const bg = full ? '#e4f2e9' : (zero ? '#f9e6e2' : (part ? '#fdf6e3' : '#fff'));
    const border = full ? '#bfe3cd' : (zero ? '#e4b8af' : (part ? '#f0d9a0' : '#e4ddd2'));
    const checkBg = full ? '#2e9e5f' : (zero ? '#f9e6e2' : (part ? '#faf0d3' : 'transparent'));
    const checkBorder = full ? '#2e9e5f' : (zero ? '#d23b2c' : (part ? '#dfa000' : '#d6ccbe'));
    const checkColor = full ? '#fff' : (zero ? '#d23b2c' : '#9a6c00');
    const tick = full ? '✓' : (zero ? '✕' : (part ? '◐' : ''));
    const strike = full ? 'text-decoration:line-through;text-decoration-color:#9bc7ac;color:#6a6155;' : '';
    const sub = full ? `${it.code} · ${it.loc}`
      : part ? `<span style="color:#9a6c00;font-weight:600;">PARZIALE ${actual}/${it.qty}</span> · ${it.code}`
      : zero ? `<span style="color:#b13525;font-weight:600;">NON PRELEVATO</span> · ${it.code}`
      : `${it.code} · ${it.loc}`;
    const partLabel = isOpen ? 'chiudi' : 'parziale';
    const stepper = isOpen ? `
        <div style="margin-top:10px;padding-top:10px;border-top:1px dashed #e4d9c5;display:flex;align-items:center;gap:10px;">
          <span style="font-size:11.5px;color:#5a5247;flex:1;">Pezzi realmente prelevati</span>
          <button data-h="${App.reg(() => App.setActual(it.code, -1))}" style="appearance:none;cursor:pointer;width:30px;height:30px;border-radius:8px;border:1px solid #d6ccbe;background:#fff;color:#3a342c;font-size:17px;font-weight:700;line-height:1;">−</button>

        </div>` : '';

// ---------- BI ----------
// genera la narrazione dell'agente a partire dall'analisi corrente
function biNarrative(B, facts, rowLevels, colLevels, meas) {
  const m0 = meas[0];
  const fq = v => olapFmt(v, m0);
  const grand = olapAgg(facts, m0);
  const bullets = [];
  let headline = 'Pronto ad analizzare';

  if (!rowLevels.length && !colLevels.length) {
    bullets.push(`Trascina una <strong>dimensione</strong> su Righe o Colonne e una <strong>misura</strong> su Misure per costruire l'analisi: commenterò io i risultati.`);
    return { headline: 'Costruisci la tua analisi', bullets, grand };
  }

  if (rowLevels.length) {
    const lvl = rowLevels[0];
    const groups = olapDistinct(facts, lvl).map(v => ({ v, val: olapAgg(facts.filter(r => r[lvl] === v), m0) }))
      .sort((a, b) => Math.abs(b.val) - Math.abs(a.val));
    const top = groups[0], bottom = groups[groups.length - 1];
    const share = grand ? Math.round(Math.abs(top.val) / Math.abs(grand) * 100) : 0;
    headline = `${BI_FIELDS[lvl].label} per ${MEASURES[m0].label.toLowerCase()}`;
    if (top) bullets.push(`In testa <strong>${top.v}</strong> con <strong>${fq(top.val)}</strong>${MEASURES[m0].kind === 'eur' ? ` — il ${share}% del totale ${fq(grand)}` : ''}.`);
    if (bottom && groups.length > 1) bullets.push(`In coda <strong>${bottom.v}</strong> (${fq(bottom.val)}): è qui che cerco i margini di recupero.`);
  } else {
    headline = `Totale ${MEASURES[m0].label.toLowerCase()}`;
    bullets.push(`Valore complessivo sulla selezione: <strong>${fq(grand)}</strong>.`);
  }

  if (['mese', 'trimestre'].some(l => colLevels.includes(l) || rowLevels.includes(l))) {
    const giu = olapAgg(facts.filter(r => r.mese === 'Giu'), 'fatturato');
    const gen = olapAgg(facts.filter(r => r.mese === 'Gen'), 'fatturato');
    if (gen) bullets.push(`Sull'asse temporale il fatturato cresce del <strong>${Math.round((giu / gen - 1) * 100)}%</strong> da gennaio a giugno: trend in accelerazione.`);
  }
  if (rowLevels.includes('famiglia') || colLevels.includes('famiglia') || meas.includes('marginePct')) {
    bullets.push(`<strong>Valvole anti-riflusso</strong>: marginalità più alta (41%) ma rotazione lenta — candidate a una promo mirata per liberare ~€ 36k.`);
  }
  if (rowLevels.includes('cliente') || colLevels.includes('cliente') || meas.includes('scaduto')) {
    bullets.push(`Anomalia su <strong>Edilsud Costruzioni</strong>: margine sotto media e scaduto elevato — la stessa che la cabina ha già intercettato.`);
  }
  const fk = Object.keys(B.filters);
  if (fk.length) bullets.push(`Lettura filtrata su: ${fk.map(k => BI_FIELDS[k].label).join(', ')}.`);

  return { headline, bullets: bullets.slice(0, 4), grand };
}

function biScreen() {
  const B = App.state.bi;
  let facts = FACTS;
  Object.entries(B.filters).forEach(([lvl, vals]) => { if (vals) facts = facts.filter(r => vals.includes(r[lvl])); });

  const rowLevels = B.rows;
  const colLevels = B.cols;
  const meas = B.measures.length ? B.measures : ['fatturato'];
  const matches = (r, levels, tup) => levels.every((l, i) => r[l] === tup[i]);

  function tuples(levels) {
    if (!levels.length) return [[]];
    const seen = new Set(), res = [];
    facts.forEach(r => { const k = levels.map(l => r[l]).join(''); if (!seen.has(k)) { seen.add(k); res.push(levels.map(l => r[l])); } });
    res.sort((a, b) => { for (let i = 0; i < levels.length; i++) { const ord = memberOrder(levels[i]); const av = ord ? ord.indexOf(a[i]) : a[i], bv = ord ? ord.indexOf(b[i]) : b[i]; if (av < bv) return -1; if (av > bv) return 1; } return 0; });
    return res;
  }
  const rowTuples = tuples(rowLevels);
  const colTuples = tuples(colLevels);
  const colGroups = colTuples.map(ct => ({ ct, label: ct.length ? ct.join(' / ') : MEASURES[meas[0]].label }));
  if (colLevels.length) colGroups.push({ ct: null, label: 'Totale', isTotal: true });

  // ---- field palette ----
  const inUse = f => B.rows.includes(f) || B.cols.includes(f) || B.measures.includes(f) || (f in B.filters);
  const fieldChip = (field) => {
    const f = BI_FIELDS[field];
    const used = inUse(field);
    const icon = f.type === 'measure'
      ? `<span style="color:#1b4a93;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:12px;">Σ</span>`
      : `<span style="color:#a99e8d;font-size:11px;">▦</span>`;
    return `<div draggable="true" data-field="${field}" data-h="${App.reg(() => App.biDrop(field, f.type === 'measure' ? 'measures' : 'rows'))}" title="Trascina su Righe/Colonne/Misure o clicca per aggiungere" style="display:flex;align-items:center;gap:7px;cursor:grab;background:#fff;border:1px solid #e4ddd2;border-radius:8px;padding:6px 9px;margin-bottom:6px;font-size:12px;color:#3a342c;${used ? 'opacity:.5;' : ''}">${icon}<span style="flex:1;">${f.label}</span>${used ? '<span style="color:#2e9e5f;font-size:13px;">✓</span>' : '<span style="color:#cabfae;font-size:14px;">⠿</span>'}</div>`;
  };
  const measPalette = BI_MEAS.map(fieldChip).join('');
  const dimPalette = BI_DIMS.map(d => `
    <div style="margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:#a99e8d;margin-bottom:6px;">${d.icon} ${d.name}</div>
      ${d.levels.map(fieldChip).join('')}
    </div>`).join('');

  // ---- drop zones ----
  const zoneLabel = `font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:#a99e8d;margin-bottom:7px;`;
  const pill = (field, kind) => {
    const f = BI_FIELDS[field];
    const rm = App.reg(() => App.biRemove(field));
    if (kind === 'measure') {
      return `<span style="display:inline-flex;align-items:center;gap:6px;background:#eef2fb;border:1px solid #b9c8ec;border-radius:7px;padding:4px 7px;font-size:11.5px;color:#1b4a93;font-weight:600;">Σ ${f.label}<button data-h="${rm}" style="appearance:none;border:none;background:none;cursor:pointer;color:#1b4a93;font-size:13px;padding:0;line-height:1;">×</button></span>`;
    }
    if (kind === 'filter') {
      const sel = B.filters[field];
      const all = olapDistinct(FACTS, field);
      const lbl = sel == null ? 'tutti' : `${sel.length}/${all.length}`;
      const op = App.reg(() => App.biOpenFilter(field));
      return `<span style="display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid #e4ddd2;border-radius:7px;padding:4px 7px;font-size:11.5px;color:#3a342c;font-weight:600;"><button data-h="${op}" style="appearance:none;border:none;background:none;cursor:pointer;color:#3a342c;font-weight:600;font-size:11.5px;padding:0;">${f.label}: ${lbl} ▾</button><button data-h="${rm}" style="appearance:none;border:none;background:none;cursor:pointer;color:#8a8073;font-size:13px;padding:0;line-height:1;">×</button></span>`;
    }
    const mv = App.reg(() => App.biMove(field));
    return `<span style="display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid #d6ccbe;border-radius:7px;padding:4px 7px;font-size:11.5px;color:#3a342c;font-weight:600;">${f.label}<button data-h="${mv}" title="Sposta righe/colonne" style="appearance:none;border:none;background:none;cursor:pointer;color:#1b4a93;font-size:12px;padding:0;">⇄</button><button data-h="${rm}" style="appearance:none;border:none;background:none;cursor:pointer;color:#8a8073;font-size:13px;padding:0;line-height:1;">×</button></span>`;
  };
  const zone = (title, axis, fields, kind) => {
    const ph = `<span style="font-size:11px;color:#bcb2a2;font-style:italic;">trascina qui…</span>`;
    return `<div data-drop="${axis}" style="flex:1;min-width:165px;background:#faf8f4;border:1.5px dashed #d8cdbb;border-radius:10px;padding:10px 11px;min-height:62px;">
      <div style="${zoneLabel}">${title}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;">${fields.length ? fields.map(f => pill(f, kind)).join('') : ph}</div>
    </div>`;
  };

  // ---- filter member panel ----
  let filterPanel = '';
  if (B.openFilter && (B.openFilter in B.filters)) {
    const lvl = B.openFilter;
    const all = olapDistinct(FACTS, lvl);
    const ord = memberOrder(lvl);
    const members = ord ? all.slice().sort((a, b) => ord.indexOf(a) - ord.indexOf(b)) : all;
    const sel = B.filters[lvl];
    const chips = members.map(mv => {
      const on = sel == null || sel.includes(mv);
      return `<button data-h="${App.reg(() => App.biToggleMember(lvl, mv))}" style="appearance:none;cursor:pointer;border:1px solid ${on ? '#2e9e5f' : '#e4ddd2'};background:${on ? '#e4f2e9' : '#fff'};color:${on ? '#1f7a4a' : '#8a8073'};border-radius:7px;padding:5px 9px;font-size:11.5px;font-weight:600;">${on ? '✓ ' : ''}${mv}</button>`;
    }).join('');
    filterPanel = `<div style="margin-top:10px;background:#fff;border:1px solid #e4ddd2;border-radius:10px;padding:11px 12px;">
      <div style="${zoneLabel}">Membri · ${BI_FIELDS[lvl].label}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">${chips}</div>
    </div>`;
  }

  // ---- presets ("crea analisi") ----
  const presets = [
    { label: 'Marginalità per famiglia', p: { rows: ['famiglia'], cols: [], measures: ['fatturato', 'marginePct'] } },
    { label: 'Vendite per area × trimestre', p: { rows: ['area'], cols: ['trimestre'], measures: ['fatturato'] } },
    { label: 'Scaduto per cliente', p: { rows: ['cliente'], cols: [], measures: ['scaduto', 'marginePct'] } },
    { label: 'Geografia (area ▸ regione)', p: { rows: ['area', 'regione'], cols: [], measures: ['fatturato'] } },
    { label: 'Famiglia × mese', p: { rows: ['famiglia'], cols: ['mese'], measures: ['fatturato'] } },
  ];
  const presetBtns = presets.map(pr => `<button data-h="${App.reg(() => App.biPreset({ ...pr.p, filters: {}, openFilter: null }))}" style="appearance:none;cursor:pointer;border:1px solid #e4ddd2;background:#fff;color:#5a5247;font-size:11.5px;font-weight:600;padding:6px 10px;border-radius:999px;">${pr.label}</button>`).join('');

  // ---- crosstab ----
  const thStyle = `text-align:right;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#a99e8d;font-weight:600;white-space:nowrap;border-bottom:1px solid #ece6dc;`;
  const th0 = `text-align:left;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#a99e8d;font-weight:600;white-space:nowrap;border-bottom:1px solid #ece6dc;`;
  const thGroup = `text-align:center;padding:7px 10px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.05em;color:#7a6f5f;font-weight:700;white-space:nowrap;border-bottom:1px solid #ece6dc;border-left:1px solid #f4efe7;`;
  const tdLabelB = `text-align:left;padding:9px 10px;font-size:12.5px;color:#211d17;font-weight:500;white-space:nowrap;`;
  const tdNumB = `text-align:right;padding:9px 10px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#3a342c;white-space:nowrap;`;
  const leftCount = rowLevels.length || 1;

  let thead = '';
  if (colLevels.length) {
    thead += `<tr><th colspan="${leftCount}" style="${th0}border-bottom:1px solid #f4efe7;"></th>${colGroups.map(g => `<th colspan="${meas.length}" style="${thGroup}${g.isTotal ? 'color:#211d17;' : ''}">${g.label}</th>`).join('')}</tr>`;
    thead += `<tr>${(rowLevels.length ? rowLevels : ['']).map(l => `<th style="${th0}">${l ? BI_FIELDS[l].label : ''}</th>`).join('')}${colGroups.map(g => meas.map(m => `<th style="${thStyle}">${MEASURES[m].label}</th>`).join('')).join('')}</tr>`;
  } else {
    thead += `<tr>${(rowLevels.length ? rowLevels : ['']).map(l => `<th style="${th0}">${l ? BI_FIELDS[l].label : 'Misura'}</th>`).join('')}${meas.map(m => `<th style="${thStyle}">${MEASURES[m].label}</th>`).join('')}</tr>`;
  }

  const tbody = rowTuples.map((rt, ri) => {
    const changedAt = i => ri === 0 || rowLevels.some((_, j) => j <= i && rt[j] !== rowTuples[ri - 1][j]);
    const sep = rowLevels.length > 1 && ri > 0 && rt[0] !== rowTuples[ri - 1][0];
    const bd = `border-bottom:1px solid #f4efe7;${sep ? 'border-top:1px solid #e4ddd2;' : ''}`;
    let left = rowLevels.length
      ? rowLevels.map((l, i) => `<td style="${tdLabelB}${bd}${i < rowLevels.length - 1 ? 'color:#8a8073;font-weight:600;' : ''}">${changedAt(i) ? rt[i] : ''}</td>`).join('')
      : `<td style="${tdLabelB}${bd}">Totale</td>`;
    const vals = colGroups.map(g => meas.map(m => {
      const subset = facts.filter(r => matches(r, rowLevels, rt) && (g.isTotal ? true : matches(r, colLevels, g.ct)));
      const M = MEASURES[m];
      const empty = !subset.length || (M.kind === 'pct' ? subset.reduce((a, r) => a + r[M.den], 0) === 0 : olapAgg(subset, m) === 0);
      if (empty) return `<td style="${tdNumB}${bd}color:#cbc3b6;text-align:right;">–</td>`;
      return `<td style="${tdNumB}${bd}${g.isTotal ? 'font-weight:600;color:#211d17;' : ''}">${olapFmt(olapAgg(subset, m), m)}</td>`;
    }).join('')).join('');
    return `<tr class="olap-row">${left}${vals}</tr>`;
  }).join('');

  const footStyle = `padding:10px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:700;color:#211d17;border-top:2px solid #ece6dc;`;
  const tfoot = `<tr><td colspan="${leftCount}" style="${footStyle}text-align:left;font-family:'IBM Plex Sans',sans-serif;">Totale complessivo</td>${colGroups.map(g => meas.map(m => `<td style="${footStyle}text-align:right;">${olapFmt(g.isTotal ? olapAgg(facts, m) : olapAgg(facts.filter(r => matches(r, colLevels, g.ct)), m), m)}</td>`).join('')).join('')}</tr>`;

  // ---- chart view: 4 grafici per analizzare il processo ----
  const m0 = meas[0];
  const barList = (rows, mKey, labelW) => {
    const data = rows.filter(r => Math.abs(r.val) > 0); // nascondi le voci senza dati
    if (!data.length) return `<div style="font-size:12px;color:#a99e8d;padding:6px 0;">Nessun dato per la selezione corrente.</div>`;
    const mx = Math.max(1, ...data.map(r => Math.abs(r.val)));
    return data.map(r => `
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:${labelW || 120}px;flex:none;font-size:11.5px;color:#3a342c;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.label}</div>
        <div style="flex:1;height:16px;background:#f4efe7;border-radius:5px;overflow:hidden;"><div style="width:${Math.round(Math.abs(r.val) / mx * 100)}%;height:100%;background:${olapBarColor(mKey, r.val)};border-radius:5px;"></div></div>
        <div style="width:74px;flex:none;font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;color:#211d17;text-align:right;">${olapFmt(r.val, mKey)}</div>
      </div>`).join('');
  };
  const chartCard = (title, sub, inner) => `
    <div style="background:#fff;border:1px solid #e4ddd2;border-radius:12px;padding:15px 16px;">
      <div style="font-weight:600;font-size:13.5px;color:#211d17;">${title}</div>
      <div style="font-size:11px;color:#8a8073;margin-bottom:13px;">${sub}</div>
      <div style="display:flex;flex-direction:column;gap:9px;">${inner}</div>
    </div>`;
  // grafico 1: misura corrente per la dimensione di riga (o famiglia)
  const dimA = rowLevels[0] || 'famiglia';
  const rowsA = olapDistinct(facts, dimA).map(v => ({ label: v, val: olapAgg(facts.filter(r => r[dimA] === v), m0) })).sort((a, b) => Math.abs(b.val) - Math.abs(a.val)).slice(0, 8);
  // grafico 2: fatturato per mese
  const rowsB = OLAP_MESI.map(mm => ({ label: mm.name, val: olapAgg(facts.filter(r => r.mese === mm.name), 'fatturato') }));
  // grafico 3: Italia vs Export (fatturato)
  const rowsC = ['Italia', 'Export'].map(a => ({ label: a, val: olapAgg(facts.filter(r => r.area === a), 'fatturato') }));
  // grafico 4: margine % per famiglia
  const rowsD = OLAP_FAM.map(f => ({ label: f.name, val: olapAgg(facts.filter(r => r.famiglia === f.name), 'marginePct') })).sort((a, b) => b.val - a.val);
  const chartsHtml = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;">
      ${chartCard(`${MEASURES[m0].label} per ${BI_FIELDS[dimA].label.toLowerCase()}`, 'classifica sulla selezione corrente', barList(rowsA, m0, 130))}
      ${chartCard('Fatturato per mese', 'andamento gen → giu', barList(rowsB, 'fatturato', 44))}
      ${chartCard('Italia vs Export', 'quota di fatturato', barList(rowsC, 'fatturato', 60))}
      ${chartCard('Margine % per famiglia', 'redditività per linea di prodotto', barList(rowsD, 'marginePct', 130))}
    </div>`;

  // ---- narrative ----
  const nar = biNarrative(B, facts, rowLevels, colLevels, meas);
  const narBullets = nar.bullets.map(b => `<li style="margin-bottom:7px;">${b}</li>`).join('');
  const reportH = App.reg(() => App.toast(`Report «${nar.headline}» inviato a Gaetano Carluccio e Barbara Carluccio (PDF) e salvato tra le analisi.`));
  const approfH = App.reg(() => App.biToggleReports());

  // esempi di report di dettaglio (compaiono al click su "Approfondisci")
  const REPORTS = [
    { t: 'Marginalità Valvole anti-riflusso per cliente', tag: 'PDF', d: 'Margine % e volumi per i top 10 clienti, con focus Centro-Sud per la promo mirata.', meta: '6 pagine · agg. 20/06' },
    { t: 'Rotazione di magazzino per famiglia · Q1–Q2', tag: 'XLSX', d: 'Indice di rotazione e giorni di copertura per linea, capitale immobilizzato.', meta: '12 fogli · agg. 20/06' },
    { t: 'Scaduto e DSO per cliente', tag: 'PDF', d: 'Aging del credito, clienti oltre fido e piano solleciti suggerito dall’agente.', meta: '4 pagine · agg. 20/06' },
    { t: 'Italia vs Export per trimestre', tag: 'PDF', d: 'Quota e crescita per area e famiglia, con scostamento sull’obiettivo annuo.', meta: '5 pagine · agg. 20/06' },
  ];
  let reportsPanel = '';
  if (B.reports) {
    const cards = REPORTS.map(r => `
      <div style="background:#fff;border:1px solid #e4ddd2;border-radius:11px;padding:14px 15px;display:flex;flex-direction:column;gap:8px;">
        <div style="display:flex;align-items:flex-start;gap:8px;">
          <span style="flex:1;font-weight:600;font-size:13px;color:#211d17;line-height:1.3;">${r.t}</span>
          <span style="flex:none;font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:700;color:#1b4a93;background:#eef2fb;border:1px solid #cdd8f0;border-radius:6px;padding:2px 6px;">${r.tag}</span>
        </div>
        <div style="font-size:11.5px;color:#6a6155;line-height:1.45;">${r.d}</div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:2px;">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:#a99e8d;flex:1;">${r.meta}</span>
          <button data-h="${App.reg(() => App.toast('Report «' + r.t + '» aperto in anteprima (esempio dimostrativo).'))}" style="appearance:none;cursor:pointer;border:1px solid #e4ddd2;background:#fff;color:#1b4a93;font-size:11.5px;font-weight:600;padding:6px 11px;border-radius:8px;">Apri</button>
        </div>
      </div>`).join('');
    reportsPanel = `
      <div style="margin-top:16px;background:#fbf9f5;border:1px solid #e4ddd2;border-radius:14px;padding:16px 18px;">
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:4px;">
          <span style="width:22px;height:22px;border-radius:6px;background:#16213f;color:#6f8fd8;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:10px;display:flex;align-items:center;justify-content:center;flex:none;">AI</span>
          <h3 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#211d17;margin:0;">Report di dettaglio disponibili</h3>
          <button data-h="${approfH}" style="margin-left:auto;appearance:none;cursor:pointer;border:none;background:none;color:#a99e8d;font-size:18px;line-height:1;padding:0;">×</button>
        </div>
        <div style="font-size:11.5px;color:#8a8073;margin-bottom:14px;">Esempi generati dall’agente sui dati del cubo — pronti da aprire o condividere.</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;">${cards}</div>
      </div>`;
  }

  // ---- view toggle / toolbar ----
  const tbtn = (active) => `appearance:none;cursor:pointer;border:1px solid ${active ? '#16213f' : '#e4ddd2'};background:${active ? '#16213f' : '#fff'};color:${active ? '#fff' : '#5a5247'};font-size:12px;font-weight:600;padding:7px 12px;border-radius:8px;`;

  return `
  <div style="max-width:1360px;margin:0 auto;padding:24px 24px 48px;">
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
      <div>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#8a8073;">Analisi BI · workbench OLAP</span>
        <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:24px;letter-spacing:-.02em;color:#211d17;margin:8px 0 0;">Crea analisi e lascia che l'agente le racconti</h1>
      </div>
      <span style="font-size:12.5px;color:#8a8073;font-family:'IBM Plex Mono',monospace;">Cubo Vendite Airgama · 2025</span>
    </div>

    <!-- presets -->
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:#a99e8d;">Analisi rapide</span>
      ${presetBtns}
    </div>

    <div style="display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;">

      <!-- field palette -->
      <div style="flex:none;width:230px;min-width:200px;background:#fff;border:1px solid #e4ddd2;border-radius:14px;padding:15px;box-shadow:0 1px 2px rgba(33,29,23,.04);">
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;color:#211d17;margin-bottom:3px;">Campi del cubo</div>
        <div style="font-size:11px;color:#8a8073;margin-bottom:14px;">Trascina nei riquadri →</div>
        <div style="${zoneLabel}">Misure</div>
        <div style="margin-bottom:14px;">${measPalette}</div>
        <div style="${zoneLabel}">Dimensioni</div>
        ${dimPalette}
      </div>

      <!-- work area -->
      <div style="flex:1;min-width:520px;">

        <!-- toolbar -->
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
          <button data-h="${App.reg(() => App.biView('tabella'))}" style="${tbtn(B.view === 'tabella')}">▦ Tabella</button>
          <button data-h="${App.reg(() => App.biView('grafico'))}" style="${tbtn(B.view === 'grafico')}">▭ Grafico</button>
          <button data-h="${App.reg(() => App.biSwapAxes())}" style="appearance:none;cursor:pointer;border:1px solid #e4ddd2;background:#fff;color:#5a5247;font-size:12px;font-weight:600;padding:7px 12px;border-radius:8px;">⇄ Inverti assi</button>
          <button data-h="${App.reg(() => App.biClear())}" style="appearance:none;cursor:pointer;border:1px solid #e4ddd2;background:#fff;color:#5a5247;font-size:12px;font-weight:600;padding:7px 12px;border-radius:8px;">Pulisci</button>
          <button data-h="${reportH}" style="appearance:none;cursor:pointer;margin-left:auto;border:none;background:#1b4a93;color:#fff;font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:8px;">Invia report →</button>
        </div>

        <!-- drop zones -->
        <div style="background:#fff;border:1px solid #e4ddd2;border-radius:14px;padding:14px;box-shadow:0 1px 2px rgba(33,29,23,.04);margin-bottom:16px;">
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            ${zone('▤ Righe', 'rows', B.rows, 'dim')}
            ${zone('▥ Colonne', 'cols', B.cols, 'dim')}
            ${zone('Σ Misure', 'measures', B.measures, 'measure')}
            ${zone('⛃ Filtri', 'filters', Object.keys(B.filters), 'filter')}
          </div>
          ${filterPanel}
        </div>

        <!-- result -->
        <div style="background:#fff;border:1px solid #e4ddd2;border-radius:14px;padding:18px 20px 20px;box-shadow:0 1px 2px rgba(33,29,23,.04);">
          ${B.view === 'tabella'
            ? `<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;"><thead>${thead}</thead><tbody>${tbody}</tbody><tfoot>${tfoot}</tfoot></table></div>`
            : `<div style="font-weight:600;font-size:14px;color:#211d17;margin-bottom:4px;">Analisi grafica del processo</div><div style="font-size:11.5px;color:#8a8073;margin-bottom:16px;">quattro viste a confronto sulla selezione corrente</div>${chartsHtml}`}
        </div>
        ${reportsPanel}
      </div>

      <!-- agent narrative -->
      <div style="flex:none;width:330px;min-width:280px;background:#16213f;border-radius:14px;padding:20px;position:relative;overflow:hidden;">
        <div style="position:absolute;right:-30px;top:-30px;width:150px;height:150px;background:radial-gradient(circle,rgba(27,74,147,.22),transparent 70%);"></div>
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:13px;position:relative;"><span style="width:24px;height:24px;border-radius:6px;background:#1b4a93;color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center;">AI</span><span style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#6f8fd8;font-weight:600;">Report narrato dall'agente</span></div>
        <h3 style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;color:#fff;margin:0 0 12px;line-height:1.3;position:relative;">${nar.headline}</h3>
        <ul style="margin:0 0 14px;padding-left:18px;font-size:13px;line-height:1.55;color:#cfc8bd;position:relative;">${narBullets}</ul>
        <button data-h="${approfH}" style="appearance:none;cursor:pointer;width:100%;border:none;background:${B.reports ? '#28335c' : '#1b4a93'};color:#fff;font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:12.5px;padding:10px;border-radius:9px;position:relative;">${B.reports ? 'Nascondi report di dettaglio' : 'Approfondisci →'}</button>
        <div style="margin-top:11px;font-size:10.5px;color:#8a8073;line-height:1.5;position:relative;">La narrazione si aggiorna a ogni modifica dell'analisi · l'agente propone, la decisione resta a te.</div>
      </div>
    </div>
  </div>`;
}

// ---------- TOAST ----------
function toastView() {
  if (!App.state.toastShow) return '';
  return `
    <div style="position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:90;background:#16213f;color:#fff;border-radius:12px;padding:13px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 14px 40px -10px rgba(33,29,23,.6);max-width:520px;animation:agrise .22s ease;">
      <span style="width:24px;height:24px;border-radius:6px;background:#1b4a93;flex:none;display:flex;align-items:center;justify-content:center;font-size:13px;">✓</span>
      <span style="font-size:13.5px;line-height:1.4;">${App.state.toastMsg}</span>
    </div>`;
}

// ---------- render + delegation ----------
App.render = function () {
  this.handlers = {};
  this._n = 0;
  document.getElementById('app').innerHTML = view();
};

const appEl = document.getElementById('app');
appEl.addEventListener('click', e => {
  const btn = e.target.closest('[data-h]');
  if (!btn) return;
  const fn = App.handlers[btn.getAttribute('data-h')];
  if (fn) fn();
});

// drag & drop for the BI analyzer
appEl.addEventListener('dragstart', e => {
  const el = e.target.closest('[data-field]');
  if (el) { e.dataTransfer.setData('text/plain', el.getAttribute('data-field')); e.dataTransfer.effectAllowed = 'copy'; }
});
appEl.addEventListener('dragover', e => {
  const z = e.target.closest('[data-drop]');
  if (z) { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; z.style.borderColor = '#1b4a93'; z.style.background = '#eef2fb'; }
});
appEl.addEventListener('dragleave', e => {
  const z = e.target.closest('[data-drop]');
  if (z) { z.style.borderColor = ''; z.style.background = ''; }
});
appEl.addEventListener('drop', e => {
  const z = e.target.closest('[data-drop]');
  if (!z) return;
  e.preventDefault();
  const field = e.dataTransfer.getData('text/plain');
  if (field && BI_FIELDS[field]) App.biDrop(field, z.getAttribute('data-drop'));
});

App.render();
</script>
</body>
</html>
